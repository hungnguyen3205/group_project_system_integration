_format_version: "2.1"
_transform: true

services:
  - name: order-service
    url: http://order-api:5000
    routes:
      - name: order-route
        paths:
          - /orders
        strip_path: false
    plugins:
      - name: key-auth
      - name: rate-limiting
        config:
          minute: 10
          policy: local

  - name: report-service
    url: http://report-service:5001
    routes:
      - name: report-route
        paths:
          - /report
        strip_path: false
    plugins:
      - name: key-auth
      - name: rate-limiting
        config:
          minute: 10
          policy: local

consumers:
  - username: student
    keyauth_credentials:
      - key: noah-secret-key
