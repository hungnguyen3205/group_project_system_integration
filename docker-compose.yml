version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: noah_mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: noah_retail
    volumes:
      - ./infrastructure/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: noah_rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: always

  postgres:
    image: postgres:15
    container_name: noah_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_password
      POSTGRES_DB: finance_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  legacy_sync:
    build: ./module1_legacy_sync
    container_name: legacy_sync_service
    volumes:
      - ./data:/app/data
    depends_on:
      - mysql
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  order_api:
    build: ./module2_order_api
    container_name: order_api_service
    ports:
      - "8000:8000"
    volumes:
      - ./module2_order_api:/app
    depends_on:
      - mysql
      - rabbitmq
    environment:
      - PYTHONUNBUFFERED=1

  worker_service:
    build: ./module3_worker
    container_name: worker_service
    ports:
      - "5002:5002"
    volumes:
      - ./module3_worker:/app
    depends_on:
      - rabbitmq
      - postgres
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  report_service:
    build: ./module4_reporting
    container_name: report_api_service
    ports:
      - "5001:5001"
    volumes:
      - ./module4_reporting:/app # Thêm dòng này để sync code nhanh
    depends_on:
      - mysql
      - postgres
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

volumes:
  mysql_data:
  postgres_data: